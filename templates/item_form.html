{{define "content"}}
<div class="max-w-lg">
  <h1 class="text-2xl font-bold text-slate-800 mb-6">アイテム登録</h1>

  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
    <form hx-post="/items/new" hx-swap="none" hx-encoding="multipart/form-data" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-600 mb-1.5">タイトル</label>
        <input type="text" name="title" required
               class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-600 mb-1.5">説明</label>
        <textarea name="description" rows="4"
                  class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors resize-none"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-600 mb-1.5">画像（複数可）</label>
        <input type="file" name="images" accept="image/*" multiple
               class="w-full text-sm text-slate-500
                      file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0
                      file:text-sm file:font-medium file:bg-indigo-50 file:text-indigo-700
                      hover:file:bg-indigo-100">
      </div>
      <button type="submit"
              class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-5 py-2.5 text-sm font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        登録
      </button>
    </form>
  </div>
</div>
{{end}}
