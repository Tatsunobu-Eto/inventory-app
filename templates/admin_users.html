{{define "content"}}
<div x-data="{createOpen:false}">
  <!-- ヘッダー -->
  <div class="mb-6 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">ユーザー管理</h1>
      <p class="text-sm text-slate-400 mt-1">{{.Department.Name}}</p>
    </div>
    <button type="button" @click="createOpen=true"
            class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-4 py-2.5 text-sm font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
      </svg>
      ユーザーを作成
    </button>
  </div>

  <!-- モーダル -->
  <div x-show="createOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center">
    <!-- オーバーレイ -->
    <div class="absolute inset-0 bg-black/40" @click="createOpen=false"></div>
    <!-- ダイアログ -->
    <div class="relative bg-white rounded-2xl shadow-xl p-6 w-full max-w-md mx-4">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-base font-semibold text-slate-800 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
          </svg>
          新規ユーザーの作成
        </h2>
        <button type="button" @click="createOpen=false"
                class="text-slate-400 hover:text-slate-600 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <form hx-post="/admin/users" hx-swap="none" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">ユーザー名</label>
          <input type="text" name="username" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">表示名</label>
          <input type="text" name="display_name" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">パスワード</label>
          <input type="password" name="password" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
        </div>
        <div class="flex justify-end gap-2 pt-1">
          <button type="button" @click="createOpen=false"
                  class="px-4 py-2.5 text-sm font-medium text-slate-600 hover:text-slate-800 border border-slate-200 hover:border-slate-300 rounded-lg transition-colors">
            キャンセル
          </button>
          <button type="submit"
                  class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-5 py-2.5 text-sm font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            作成
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ユーザー一覧 -->
  <h2 class="text-sm font-semibold text-slate-700 mb-3">ユーザー一覧</h2>
  <div class="space-y-2 max-w-lg">
    {{range .Users}}
    <div class="bg-white border border-slate-200 rounded-xl p-4" x-data="{pwOpen:false, transferOpen:false}">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium text-slate-800">{{.DisplayName}}</div>
          <div class="text-xs text-slate-400">@{{.Username}} · {{.Role}}</div>
        </div>
        {{if eq .Role "user"}}
        <div class="flex items-center gap-2 shrink-0">
          <!-- 異動ボタン -->
          <button type="button" @click="transferOpen=!transferOpen"
                  class="text-xs text-violet-500 hover:text-violet-700 border border-violet-200 hover:border-violet-300 rounded-lg px-2.5 py-1.5 transition-colors">
            異動
          </button>
          <!-- PW リセットボタン -->
          <button type="button" @click="pwOpen=!pwOpen"
                  class="text-xs text-slate-500 hover:text-indigo-600 border border-slate-200 hover:border-indigo-300 rounded-lg px-2.5 py-1.5 transition-colors">
            PW リセット
          </button>
          <!-- 削除ボタン -->
          <form hx-post="/admin/users/{{.ID}}/delete" hx-swap="none"
                hx-confirm="{{.DisplayName}} を削除しますか？\n関連するアイテム・取引履歴も全て削除されます。">
            <button type="submit"
                    class="text-xs text-red-500 hover:text-red-700 border border-red-200 hover:border-red-300 rounded-lg px-2.5 py-1.5 transition-colors">
              削除
            </button>
          </form>
        </div>
        {{end}}
      </div>
      {{if eq .Role "user"}}
      <!-- PW リセットフォーム（トグル） -->
      <div x-show="pwOpen" x-cloak class="mt-3 pt-3 border-t border-slate-100">
        <form hx-post="/admin/users/{{.ID}}/reset-password" hx-swap="none"
              class="flex gap-2" @submit="pwOpen=false">
          <input type="password" name="new_password" required placeholder="新しいパスワード"
                 class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
          <button type="submit"
                  class="inline-flex items-center gap-1 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-3 py-2 text-sm font-semibold transition-colors">
            設定
          </button>
        </form>
      </div>
      <!-- 異動フォーム（トグル） -->
      <div x-show="transferOpen" x-cloak class="mt-3 pt-3 border-t border-slate-100">
        <form hx-post="/admin/users/{{.ID}}/transfer" hx-swap="none"
              class="flex gap-2" @submit="transferOpen=false">
          <select name="department_id" required
                  class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors bg-white">
            <option value="">-- 異動先部門を選択 --</option>
            {{range $.Departments}}
            <option value="{{.ID}}">{{.Name}}</option>
            {{end}}
          </select>
          <button type="submit"
                  class="inline-flex items-center gap-1 bg-violet-600 hover:bg-violet-700 text-white rounded-lg px-3 py-2 text-sm font-semibold transition-colors">
            実行
          </button>
        </form>
      </div>
      {{end}}
    </div>
    {{else}}
    <p class="text-sm text-slate-400">ユーザーがいません</p>
    {{end}}
  </div>
</div>
{{end}}
