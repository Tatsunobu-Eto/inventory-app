{{define "content"}}
<div class="max-w-md">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-800">パスワード変更</h1>
    <p class="text-sm text-slate-500 mt-1">現在のパスワードを確認してから新しいパスワードを設定してください</p>
  </div>

  <div class="bg-white border border-slate-200 rounded-xl p-6">
    <form hx-post="/profile/password" hx-swap="none">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">現在のパスワード</label>
          <input type="password" name="current_password" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                 placeholder="現在のパスワード">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">新しいパスワード</label>
          <input type="password" name="new_password" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                 placeholder="新しいパスワード">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">新しいパスワード（確認）</label>
          <input type="password" name="confirm_password" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                 placeholder="新しいパスワード（確認）">
        </div>
      </div>
      <div class="mt-6 flex gap-3">
        <button type="submit"
                class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg text-sm transition-colors">
          変更する
        </button>
        <a href="/"
           class="flex-1 text-center border border-slate-300 text-slate-700 hover:bg-slate-50 font-medium py-2 rounded-lg text-sm transition-colors">
          キャンセル
        </a>
      </div>
    </form>
  </div>
</div>
{{end}}
