# デバッグ専用 Compose ファイル（本番の docker-compose.yml は変更しない）
# 使い方: docker compose -f docker-compose.debug.yml up --build
#
# 事前に以下を実行して vendor に dlv を含めること:
#   go get github.com/go-delve/delve/cmd/dlv@v1.23.1
#   go mod tidy
#   go mod vendor

services:
  db:
    image: postgres:17-alpine
    container_name: shomohin_db_debug
    restart: "no"
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_debug:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.debug
    image: shomohin_app:debug
    container_name: shomohin_app_debug
    restart: "no"
    ports:
      - "8080:8080"
      - "127.0.0.1:40000:40000"  # デバッガポートはローカルホストのみ公開
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    # Delve が ptrace を使用するために必要なコンテナ権限
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

volumes:
  pgdata_debug:
